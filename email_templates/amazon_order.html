<html>
<head><style>
  body { font-family: Arial, sans-serif; background:#eaeded; padding:20px; }
  .container { max-width:500px; margin:auto; background:white; padding:30px; border-radius:4px; }
  .logo { color:#ff9900; font-size:28px; font-weight:bold; }
  .btn { background:#ff9900; color:white; padding:12px 28px; text-decoration:none; border-radius:4px; font-weight:bold; display:inline-block; }
  .footer { font-size:12px; color:#999; margin-top:30px; }
</style></head>
<body>
<div class="container">
  <div class="logo">amazon</div>
  <p>Hello {{name}},</p>
  <p>Your order of <strong>$299.99</strong> has been confirmed for account <strong>{{email}}</strong> on {{date}}.</p>
  <p>If you didn’t place this order, cancel it immediately.</p>
  <p style="text-align:center; margin:20px 0;">
    <a href="{{link}}" class="btn">Cancel Order</a>
  </p>
  <div class="footer">Amazon.com, Inc. · Educational simulation</div>
</div>
</body>
</html>
