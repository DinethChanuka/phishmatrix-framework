<html>
<head><style>
  body { font-family: 'Helvetica Neue', Arial, sans-serif; background:#f5f5f7; padding:20px; }
  .card { max-width:500px; margin:auto; background:white; padding:30px; border-radius:12px; }
  .logo { font-size:24px; color:#000; font-weight:bold; }
  .btn { background:#0071e3; color:white; padding:12px 20px; text-decoration:none; border-radius:8px; display:inline-block; font-weight:bold; }
  .footer { font-size:12px; color:#8e8e93; margin-top:30px; }
</style></head>
<body>
<div class="card">
  <div class="logo"> Apple ID</div>
  <p>Dear {{name}},</p>
  <p>Your Apple ID (<strong>{{email}}</strong>) has been locked for security reasons on {{date}}.</p>
  <p>To regain access, you must verify your account.</p>
  <p style="text-align:center; margin:25px 0;">
    <a href="{{link}}" class="btn">Unlock Account</a>
  </p>
  <div class="footer">Apple Inc. · One Apple Park Way, Cupertino, CA 95014</div>
</div>
</body>
</html>
