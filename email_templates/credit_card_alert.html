<html>
<head><style>
  body { font-family: Arial, sans-serif; background:#fff; padding:20px; }
  .wrap { max-width:520px; margin:auto; border:1px solid #d32f2f; border-radius:8px; padding:30px; }
  .alert { color:#d32f2f; font-weight:bold; font-size:18px; margin-bottom:15px; }
  .btn { background:#d32f2f; color:white; padding:12px 24px; text-decoration:none; border-radius:4px; font-weight:bold; display:inline-block; }
  .footer { font-size:12px; color:#888; margin-top:30px; }
</style></head>
<body>
<div class="wrap">
  <div class="alert">⚠ Fraud Alert</div>
  <p>Dear {{name}},</p>
  <p>We detected a suspicious transaction on your card linked to <strong>{{email}}</strong> on {{date}}.</p>
  <p>To prevent further unauthorised charges, please confirm your identity immediately.</p>
  <p style="text-align:center; margin:25px 0;">
    <a href="{{link}}" class="btn">Verify Transaction</a>
  </p>
  <div class="footer">Card Services · Educational simulation only</div>
</div>
</body>
</html>
