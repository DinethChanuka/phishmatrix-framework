<html>
<head><style>
  body { font-family: Arial, sans-serif; background:#e6e9ef; padding:20px; }
  .panel { max-width:500px; margin:auto; background:white; padding:30px; border-radius:8px; }
  .logo { font-size:24px; color:#003366; font-weight:bold; margin-bottom:20px; }
  .btn { background:#f5a623; color:white; padding:12px 30px; text-decoration:none; border-radius:4px; font-weight:bold; display:inline-block; }
  .footer { font-size:12px; color:#777; margin-top:30px; }
</style></head>
<body>
<div class="panel">
  <div class="logo">SecureBank</div>
  <p>Dear {{name}},</p>
  <p>Your online banking profile (<strong>{{email}}</strong>) requires a security update as of {{date}}.</p>
  <p>Please verify your identity to continue using our services without interruption.</p>
  <p style="text-align:center; margin:25px 0;">
    <a href="{{link}}" class="btn">Verify Now</a>
  </p>
  <div class="footer">SecureBank · FDIC insured · Educational simulation</div>
</div>
</body>
</html>
