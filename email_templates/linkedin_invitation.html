<html>
<head><style>
  body { font-family: -apple-system, sans-serif; background:#f4f2ee; padding:20px; }
  .box { max-width:500px; margin:auto; background:white; padding:30px; border-radius:8px; }
  .logo { font-size:26px; color:#0077b5; font-weight:bold; }
  .btn { background:#0077b5; color:white; padding:10px 25px; text-decoration:none; border-radius:25px; font-weight:bold; display:inline-block; margin:20px 0; }
  .footer { font-size:12px; color:#666; margin-top:30px; }
</style></head>
<body>
<div class="box">
  <div class="logo">LinkedIn</div>
  <p>Hi {{name}},</p>
  <p>You have a new connection request and message waiting for <strong>{{email}}</strong> as of {{date}}.</p>
  <p>View your invitation and respond now.</p>
  <p style="text-align:center;">
    <a href="{{link}}" class="btn">View Invitation</a>
  </p>
  <div class="footer">LinkedIn Corporation · 1000 W Maude Ave, Sunnyvale, CA 94085</div>
</div>
</body>
</html>
